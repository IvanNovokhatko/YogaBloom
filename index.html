<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/YogaBloom/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:wght@400&family=Roboto:wght@400&family=Sarabun:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/YogaBloom/index.js"></script>
    <link rel="stylesheet" crossorigin href="/YogaBloom/assets/index-DEeHPCOu.css">
  </head>
  <body>
    <header class="header">
  <div class="header__container container">
    <button class="burger-open-button" type="button">
      <svg width="24" height="24">
        <use href="/YogaBloom/assets/icons-CaFcvtfz.svg#icon-burger-menu"></use>
      </svg>
    </button>
    <nav class="navigation">
      <ul class="navigation__list">
        <li class="navigation__list__item">
          <a class="navigation__list__link active" href="#yoga-classes"
            >Yoga Classes</a
          >
        </li>
        <li class="navigation__list__item">
          <a class="navigation__list__link" href="#team">Team</a>
        </li>
        <li class="navigation__list__item">
          <a class="navigation__list__link" href="#testimonials"
            >Testimonials</a
          >
        </li>
        <li class="navigation__list__item">
          <a class="navigation__list__link" href="#pricing">Pricing</a>
        </li>
        <li class="navigation__list__item">
          <a class="navigation__list__link" href="#footer">Contacts</a>
        </li>
      </ul>
    </nav>
    <a class="header__logo" href="./">
      <svg width="84" height="36">
        <use href="/YogaBloom/assets/icons-CaFcvtfz.svg#icon-logo"></use>
      </svg>
    </a>
    <a class="header__button" href="#pricing">Join now</a>
  </div>
</header>


    <main>
      <!-- Loads the specified .html file -->
      <section class="hero">
  <div class="hero__image-wrapper">
    <img
      class="hero__image"
      src="../img/hero/hero.jpg"
      alt="Woman practicing yoga at sunset"
      srcset="../img/hero/hero.jpg 1x, ../img/hero/hero@2x.jpg 2x"
      width="1440"
    />
  </div>

  <div class="hero__container container">
    <div class="hero__content-wrapper">
      <h1 class="hero__main-title">Transform Your Life with Our Yoga Clases</h1>
      <div>
        <p class="hero__description">
          Discover the harmony of mind and body through our expertly designed
          yoga programs. Join a community dedicated to wellness and personal
          growth.
        </p>
        <ul class="hero__button-list">
          <li>
            <a href="#pricing" class="hero__button-join-to">Join Now</a>
          </li>
          <li>
            <a href="#gallery" class="hero__button-learn-more">Learn More</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>

      
      
      
      
      
      
    </main>

    
    
    

  </body>
</html>
